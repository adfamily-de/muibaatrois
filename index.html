<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beleza Divina</title>
    <link rel="stylesheet" href="./assets/index-tPrb7xIw.css">
    <style>
      /* Estilo rápido para visualizar imagens */
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }
      section {
        margin-bottom: 40px;
      }
      section h2 {
        margin-bottom: 15px;
      }
      .gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .gallery img {
        width: 200px;
        height: auto;
        border-radius: 10px;
        object-fit: cover;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hero Slides -->
    <section>
      <h2>Hero Slides</h2>
      <div class="gallery">
        <img src="./images/hero-slide-1.jpg" alt="Hero Slide 1">
        <img src="./images/hero-slide-2.jpg" alt="Hero Slide 2">
        <img src="./images/hero-slide-3.jpg" alt="Hero Slide 3">
      </div>
    </section>

    <!-- Combos -->
    <section>
      <h2>Combos</h2>
      <div class="gallery">
        <img src="./images/combo-1.jpg" alt="Combo 1">
        <img src="./images/combo-2.jpg" alt="Combo 2">
        <img src="./images/combo-3.jpg" alt="Combo 3">
      </div>
    </section>

    <!-- Instagram -->
    <section>
      <h2>Instagram</h2>
      <div class="gallery">
        <img src="./images/instagram-1.jpg" alt="Instagram 1">
        <img src="./images/instagram-2.jpg" alt="Instagram 2">

        <img src="./images/instagram-4.jpg" alt="Instagram 4">

        <img src="./images/product-1.jpg" alt="Product 1">
        <img src="./images/product-2.jpg" alt="Product 2">
        <img src="./images/product-3.jpg" alt="Product 3">
        <img src="./images/product-4.jpg" alt="Product 4">
      </div>
    </section>

    <!-- Services -->
    <section>
      <h2>Services</h2>
      <div class="gallery">
        <img src="./images/service-acessorios.jpg" alt="Service Acessorios">
